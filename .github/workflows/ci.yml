name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run format:check
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run coverage
      # fake-vs-SQLite repository parity; needs the Bun runtime (bun:sqlite)
      - run: bun nx run-many -t test-contract
      - run: docker build .

  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Check for infrastructure drift
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::notice::RAILWAY_TOKEN secret not set - skipping drift check. Add a project token to enable it."
            exit 0
          fi
          bun install --frozen-lockfile
          bunx railway config plan --detailed-exit-code
